services:
  rtsp-proxy:
    image: bluenviron/mediamtx:latest
    container_name: rtsp-proxy-server
    restart: unless-stopped
    ports:
    - 8554:8554
    - 8443:8443
    - 8888:8888
    volumes:
    - ./mediamtx.yml:/mediamtx.yml
    networks:
    - camera-net
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    networks:
    - camera-net
    restart: unless-stopped
    ports:
    - 9092:9092
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  worker-cam1:
    build:
      context: ../worker_build
      dockerfile: Dockerfile
    container_name: worker-cam1
    restart: on-failure
    depends_on:
    - rtsp-proxy
    - kafka
    environment:
    - RTSP_URL=rtsp://rtsp-proxy:8554/cam1
    - CAMERA_ID=cam1
    - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
    - ./capturas:/app/capturas
    networks:
    - camera-net
  worker-cam2:
    build:
      context: ../worker_build
      dockerfile: Dockerfile
    container_name: worker-cam2
    restart: on-failure
    depends_on:
    - rtsp-proxy
    - kafka
    environment:
    - RTSP_URL=rtsp://rtsp-proxy:8554/cam2
    - CAMERA_ID=cam2
    - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
    - ./capturas:/app/capturas
    networks:
    - camera-net
  worker-cam3:
    build:
      context: ../worker_build
      dockerfile: Dockerfile
    container_name: worker-cam3
    restart: on-failure
    depends_on:
    - rtsp-proxy
    - kafka
    environment:
    - RTSP_URL=rtsp://rtsp-proxy:8554/cam3
    - CAMERA_ID=cam3
    - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
    - ./capturas:/app/capturas
    networks:
    - camera-net
networks:
  camera-net:
    driver: bridge
